name: Build static site

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build
        run: npm run build
      - name: Verify launch pages
        run: |
          test -f public/index.html
          test -f public/sanctions.html
          test -f public/tools.html
          test -f public/figures.html
          test -f public/support.html
          test -f public/about.html
          test -f public/privacy.html
          test -f public/references.html
          test -f public/changelog.html
          test -f public/faq.html
          test -f public/sectors.html
          test -f public/sectors/banking.html
          test -f public/sectors/energy.html
          test -f public/sectors/telecom.html
          test -f public/sectors/real-estate.html
          test -f public/sectors/investment.html
          test -f public/sectors/contribution.html
          test -f public/sectors/compliance.html
          test -f public/sectors/aml-cft-kyc.html
          test -f public/sectors/agri-food.html
          test -f public/sectors/wash.html
          test -f public/404.html
          grep -q "SyriaInsight" public/index.html
          grep -q "Not legal advice" public/index.html
          grep -q "Not a CRA-registered charity" public/about.html
          grep -q "PIPEDA" public/privacy.html
      - name: Pre-push gate — compliance smoke checks
        run: |
          set -e
          # Disclaimer on key public pages
          for f in index.html sanctions.html faq.html tools.html figures.html support.html about.html privacy.html sectors.html references.html changelog.html \
            sectors/banking.html sectors/energy.html sectors/telecom.html sectors/real-estate.html sectors/investment.html sectors/contribution.html \
            sectors/compliance.html sectors/aml-cft-kyc.html sectors/agri-food.html sectors/wash.html; do
            grep -q "Not legal advice" "public/$f"
          done
          # NPO / charity posture
          grep -q "Not a CRA-registered charity" public/about.html
          grep -q "Not a CRA-registered charity" public/index.html
          # Privacy / OPC
          grep -q "PIPEDA" public/privacy.html
          grep -q "priv.gc.ca" public/privacy.html
          # References present and linked
          test -f public/references.html
          grep -q 'href="/references.html"' public/about.html
          grep -q 'href="/references.html"' public/index.html
          grep -q 'id="secondary-us"' public/references.html
          grep -q 'sy.usembassy.gov/business' public/references.html
          # Changelog present and linked
          test -f public/changelog.html
          grep -q 'href="/changelog.html"' public/about.html
          grep -q 'href="/changelog.html"' public/references.html
          grep -q "Content change log" public/changelog.html
          # Tools / Support: shared economic sector field
          grep -q 'name="sector"' public/tools.html
          grep -q 'name="sector"' public/support.html
          grep -q 'value="energy"' public/tools.html
          grep -q 'value="real-estate"' public/support.html
          grep -q 'value="compliance"' public/tools.html
          grep -q 'value="aml-cft-kyc"' public/tools.html
          grep -q 'value="aml-cft-kyc"' public/support.html
          grep -q 'value="agri-food"' public/support.html
          grep -q 'value="wash"' public/tools.html
          grep -q 'value="investor"' public/support.html
          # Sector hub links to briefs
          grep -q 'href="/sectors/banking.html"' public/sectors.html
          grep -q 'href="/sectors/energy.html"' public/sectors.html
          grep -q 'href="/sectors/telecom.html"' public/sectors.html
          grep -q 'href="/sectors/real-estate.html"' public/sectors.html
          grep -q 'href="/sectors/investment.html"' public/sectors.html
          grep -q 'href="/sectors/contribution.html"' public/sectors.html
          grep -q 'href="/sectors/compliance.html"' public/sectors.html
          grep -q 'href="/sectors/aml-cft-kyc.html"' public/sectors.html
          grep -q 'href="/sectors/agri-food.html"' public/sectors.html
          grep -q 'href="/sectors/wash.html"' public/sectors.html
          # Sector pages: Canada primary + secondary attribution; no PDF hosting
          for f in sectors/banking.html sectors/energy.html sectors/telecom.html sectors/real-estate.html; do
            grep -q "international.gc.ca" "public/$f"
            grep -q "Doing Business in Syria" "public/$f"
            grep -q "Not legal advice" "public/$f"
          done
          # Investment lens: GoC primaries + secondary attribution; analysis labelled
          grep -q "international.gc.ca" public/sectors/investment.html
          grep -q "laws.justice.gc.ca" public/sectors/investment.html
          grep -q "gazette.gc.ca" public/sectors/investment.html
          grep -q "Doing Business in Syria" public/sectors/investment.html
          grep -q "Operational analysis" public/sectors/investment.html
          grep -q 'href="/sectors/investment.html"' public/faq.html
          # Contribution ranking: method + WB + GoC; no clearance language
          grep -q "worldbank.org" public/sectors/contribution.html
          grep -q "international.gc.ca" public/sectors/contribution.html
          grep -q "Research ranking only" public/sectors/contribution.html
          grep -q "statcan.gc.ca" public/sectors/contribution.html
          grep -q "fao.org" public/sectors/contribution.html
          grep -q "worldbank.org" public/sectors/energy.html
          grep -q "gazette.gc.ca" public/sectors/telecom.html
          grep -q "worldbank.org" public/sectors/real-estate.html
          grep -q "id=\"secondary-institutional\"" public/references.html
          # PR2 gap briefs (no Investor Guide requirement)
          grep -q "international.gc.ca" public/sectors/compliance.html
          grep -q "Not clearance software" public/sectors/compliance.html
          grep -q "SWIFT" public/sectors/compliance.html
          grep -q 'href="/sectors/compliance.html"' public/sectors/banking.html
          grep -q "fao.org" public/sectors/agri-food.html
          grep -q "chemical" public/sectors/agri-food.html
          grep -q "international.gc.ca" public/sectors/agri-food.html
          grep -q "worldbank.org" public/sectors/wash.html
          grep -q "international.gc.ca" public/sectors/wash.html
          grep -q "16-511" public/references.html
          grep -q 'href="/sectors/compliance.html"' public/sectors/contribution.html
          grep -q 'href="/sectors/agri-food.html"' public/sectors/contribution.html
          grep -q 'href="/sectors/wash.html"' public/sectors/contribution.html
          # AML / CFT / KYC brief (no Investor Guide requirement)
          grep -q "fintrac-canafe.canada.ca" public/sectors/aml-cft-kyc.html
          grep -q "fatf-gafi.org" public/sectors/aml-cft-kyc.html
          grep -q "P-24.501" public/sectors/aml-cft-kyc.html
          grep -q "83.03" public/sectors/aml-cft-kyc.html
          grep -q "faq.aspx" public/sectors/aml-cft-kyc.html
          grep -q "Not legal advice" public/sectors/aml-cft-kyc.html
          grep -q 'href="/sectors/aml-cft-kyc.html"' public/sectors.html
          grep -q 'href="/sectors/aml-cft-kyc.html"' public/faq.html
          grep -q 'href="/sectors/aml-cft-kyc.html"' public/sectors/banking.html
          grep -q 'id="aml-cft-kyc"' public/references.html
          if find public -iname '*.pdf' | grep -q .; then
            echo "FAIL: PDF found under public/ — Investor Guides must not be republished on the site"
            exit 1
          fi
          # No public developer instruction to replace Formspree ID
          if grep -Eiq 'Replace.*(YOUR_FORM_ID|Formspree)' public/support.html; then
            echo "FAIL: developer Formspree instruction found in public support page"
            exit 1
          fi
          # Primary source anchors still present on sanctions / figures / FAQ
          grep -q "international.gc.ca" public/sanctions.html
          grep -q "laws.justice.gc.ca" public/sanctions.html
          grep -q "canada.ca/en/global-affairs" public/figures.html
          grep -q "international.gc.ca" public/faq.html
          grep -q "laws.justice.gc.ca" public/faq.html
          grep -q "gazette.gc.ca" public/faq.html
          grep -q "Not legal advice" public/faq.html
          grep -q 'href="/faq.html"' public/index.html
          echo "Pre-push gate smoke checks passed"
